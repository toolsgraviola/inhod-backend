services:
  mysql:
    image: mysql:8.4
    container_name: surfabroad-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: surfabroad
      MYSQL_USER: surfabroad
      MYSQL_PASSWORD: surfabroad
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5
    container_name: surfabroad-phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: surfabroad
      PMA_PASSWORD: surfabroad
      UPLOAD_LIMIT: 128M
    ports:
      - "8080:80"

  redis:
    image: redis:7
    container_name: surfabroad-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  mysql_data:
